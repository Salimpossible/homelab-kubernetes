apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: downloads-smb
  namespace: media
  annotations:
    description: SMB-backed downloads workspace shared by media automation workloads
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: smb-media
  resources:
    requests:
      storage: 350Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media
  namespace: media
  annotations:
    description: Shared media library mounted by Plex, Radarr, and Sonarr
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: smb-media
  resources:
    requests:
      storage: 3Ti