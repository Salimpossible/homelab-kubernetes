apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: monitoring
  labels:
    app.kubernetes.io/name: homepage
data:
  # Tell Homepage to run in-cluster and read ingresses
  kubernetes.yaml: |
    mode: cluster
    ingress: true
    labelSelector: app
    # traefik: true   # enable if you also use Traefik IngressRoute
    # gateway: true   # enable if you use Gateway API
  settings.yaml: ""
  custom.css: ""
  custom.js: ""
  # You can keep these minimal and rely mostly on automatic discovery
  bookmarks.yaml: |
    - Dev:
        - K8s Dashboard:
            href: https://kubernetes-dashboard.home.arpa/
  services.yaml: |
    - Cluster:
        - Homepage:
            href: https://homepage.home.arpa/
            description: Main homelab dashboard
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
        network: default
    - search:
        provider: duckduckgo
        target: _blank
  docker.yaml: ""