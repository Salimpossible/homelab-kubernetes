apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
  namespace: media
  labels:
    app: plex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plex
  template:
    metadata:
      labels:
        app: plex
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: homelab.io/downloads-local
                operator: In
                values:
                - "true"
      containers:
      - name: plex
        image: plexinc/pms-docker:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: Europe/Paris
        - name: PLEX_CLAIM
          valueFrom:
            secretKeyRef:
              name: media-stack-env
              key: PLEX_CLAIM
        ports:
        - containerPort: 32400
          name: webui
        volumeMounts:
        - name: plex-config
          mountPath: /config
        - name: media
          mountPath: /media
        resources:
          requests:
            cpu: 250m
            memory: 768Mi
          limits:
            cpu: 2000m
            memory: 4Gi
        livenessProbe:
          httpGet:
            path: /web
            port: 32400
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /web
            port: 32400
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: plex-config
        persistentVolumeClaim:
          claimName: plex-config-laptop
      - name: media
        persistentVolumeClaim:
          claimName: media
