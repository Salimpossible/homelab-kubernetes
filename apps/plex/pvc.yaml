apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-config-laptop
  namespace: media
  annotations:
    description: "Plex database, cache, and metadata"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 50Gi  # Database + cache for large media libraries
