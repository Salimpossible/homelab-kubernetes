apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpn-torrent
  namespace: media
  labels:
    app: vpn-torrent
    component: download-manager
    app.kubernetes.io/name: qbittorrent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vpn-torrent
      component: download-manager
  template:
    metadata:
      labels:
        app: vpn-torrent
        component: download-manager
        app.kubernetes.io/name: qbittorrent
    spec:
      serviceAccountName: qbittorrent-job-trigger
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: homelab.io/downloads-local
                    operator: In
                    values:
                      - "true"
      terminationGracePeriodSeconds: 30

      containers:
        # VPN Gateway Container
        - name: gluetun
          image: qmcgaw/gluetun@sha256:4f1ecfedd717bca7b2d94b405380a717bcf40ba723d82a69428d816744664542
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
            privileged: true
          env:
            # Non-sensitive: custom WireGuard provider config
            - name: VPN_SERVICE_PROVIDER
              value: "custom"
            - name: VPN_TYPE
              value: "wireguard"
            - name: WIREGUARD_ALLOWED_IPS
              value: "0.0.0.0/0,::/0"
            - name: FIREWALL_VPN_INPUT_PORTS
              value: "6881"
            - name: FIREWALL_INPUT_PORTS
              value: "6881"
            - name: BLOCK_MALICIOUS
              value: "off"
            - name: DOT
              value: "off"
            - name: DNS_ADDRESS
              value: "1.1.1.1"
            - name: HEALTH_VPN_DURATION_INITIAL
              value: "60s"
            - name: HEALTH_SUCCESS_WAIT_DURATION
              value: "30s"
            - name: LOG_LEVEL
              value: "debug"
            - name: TZ
              value: "Europe/Paris"
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: "10.42.0.0/16,10.43.0.0/16"
            # Sensitive: from secret
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: media-stack-env
                  key: WIREGUARD_PRIVATE_KEY
            - name: WIREGUARD_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: media-stack-env
                  key: WIREGUARD_PUBLIC_KEY
            - name: WIREGUARD_ADDRESSES
              valueFrom:
                secretKeyRef:
                  name: media-stack-env
                  key: WIREGUARD_ADDRESSES
            - name: WIREGUARD_ENDPOINT_IP
              valueFrom:
                secretKeyRef:
                  name: media-stack-env
                  key: WIREGUARD_ENDPOINT_IP
            - name: WIREGUARD_ENDPOINT_PORT
              valueFrom:
                secretKeyRef:
                  name: media-stack-env
                  key: WIREGUARD_ENDPOINT_PORT
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
              ephemeral-storage: 512Mi

        # qBittorrent Container
        - name: qbittorrent
          image: linuxserver/qbittorrent@sha256:1fc78c81850d658f17701bfa9d8de58ccc12ff27d36a9a176c6299e55aaf4b4e
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Europe/Paris"
            - name: WEBUIPORT
              value: "8080"
            - name: TORRENTINGPORT
              value: "6881"
          ports:
          - name: webui
            containerPort: 8080
            protocol: TCP
          - name: bittorrent-tcp
            containerPort: 6881
            protocol: TCP
          - name: bittorrent-udp
            containerPort: 6881
            protocol: UDP
          volumeMounts:
            - name: qbittorrent-config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
            - name: media
              mountPath: /media
            - name: qbittorrent-hooks
              mountPath: /hooks
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
              ephemeral-storage: 256Mi
            limits:
              cpu: 2000m
              memory: 4Gi
              ephemeral-storage: 1Gi
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
        # NO ports section - gluetun handles all networking

      volumes:
        - name: gluetun-config
          persistentVolumeClaim:
            claimName: gluetun-config
        - name: qbittorrent-hooks
          configMap:
            name: qbittorrent-config
        - name: qbittorrent-config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        - name: downloads
          persistentVolumeClaim:
            claimName: downloads-smb
        - name: media
          persistentVolumeClaim:
            claimName: media
