apiVersion: v1
kind: ServiceAccount
metadata:
  name: qbittorrent-job-trigger
  namespace: media
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: qbittorrent-job-trigger
  namespace: media
rules:
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - get
  - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: qbittorrent-job-trigger
  namespace: media
subjects:
- kind: ServiceAccount
  name: qbittorrent-job-trigger
  namespace: media
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: qbittorrent-job-trigger
