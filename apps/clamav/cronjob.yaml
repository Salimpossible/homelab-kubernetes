apiVersion: batch/v1
kind: CronJob
metadata:
  name: clamav-scan
  namespace: media
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                - matchExpressions:
                  - key: homelab.io/downloads-local
                    operator: In
                    values:
                    - "true"
          containers:
          - name: clamscan
            image: clamav/clamav:latest
            command:
            - /bin/sh
            - -c
            - |
              clamscan -r --log=/var/lib/clamav/scan.log /downloads
          volumes:
          - name: clamav-config
            persistentVolumeClaim:
              claimName: clamav-config
          - name: downloads
            persistentVolumeClaim:
              claimName: downloads
          restartPolicy: OnFailure
